services:
  mysql:
    image: mysql:8.0
    container_name: job-scheduler-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-job_scheduler}
      MYSQL_USER: ${DB_USER:-jobscheduler}
      MYSQL_PASSWORD: ${DB_PASSWORD:-jobscheduler_password}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_ROOT_PASSWORD:-root_password}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: job-scheduler-backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${BACKEND_PORT:-5010}
      WORKER_PORT: ${WORKER_PORT:-5001}
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-job_scheduler}
      DB_USER: ${DB_USER:-jobscheduler}
      DB_PASSWORD: ${DB_PASSWORD:-jobscheduler_password}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      API_BASE_URL: ${API_BASE_URL:-http://localhost:5010}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    ports:
      - "${BACKEND_PORT:-5010}:5010"
    command: sh -c "npm run db:migrate && npm start"
    restart: unless-stopped

  worker:
    build:
      context: ./backend
    container_name: job-scheduler-worker
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-job_scheduler}
      DB_USER: ${DB_USER:-jobscheduler}
      DB_PASSWORD: ${DB_PASSWORD:-jobscheduler_password}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-5}
      WORKER_POLL_INTERVAL_MS: ${WORKER_POLL_INTERVAL_MS:-2000}
    command: sh -c "npm run worker"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL:-}
    container_name: job-scheduler-frontend
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
      VITE_SOCKET_URL: ${VITE_SOCKET_URL:-}
      VITE_PORT: 80
    ports:
      - "${FRONTEND_PORT:-80}:80"
    restart: unless-stopped

volumes:
  mysql_data:
