services:
  mysql:
    image: mysql:8.0
    container_name: job-scheduler-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: job_scheduler
      MYSQL_USER: jobscheduler
      MYSQL_PASSWORD: jobscheduler_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: job-scheduler-backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 5000
      WORKER_PORT: 5001
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: job_scheduler
      DB_USER: jobscheduler
      DB_PASSWORD: jobscheduler_password
      JWT_ACCESS_SECRET: docker_development_access_secret_change_me
      JWT_REFRESH_SECRET: docker_development_refresh_secret_change_me
      API_BASE_URL: http://localhost:5000
      FRONTEND_URL: http://localhost:5173
    ports:
      - "5000:5000"
    command: sh -c "npm run db:migrate && npm run db:seed && npm start"

  frontend:
    build:
      context: ./frontend
    container_name: job-scheduler-frontend
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://localhost:5000/api/v1
      VITE_SOCKET_URL: http://localhost:5000
      VITE_PORT: 5173
    ports:
      - "5173:5173"

volumes:
  mysql_data:
